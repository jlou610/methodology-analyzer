# Render Blueprint — deploys a Starter web service with a 1 GB persistent disk
# for the SQLite database. Connect this repo in the Render dashboard and it picks
# this up automatically. Starter plan (~$7/mo) is required: the free tier cannot
# mount a persistent disk.
services:
  - type: web
    name: methodology-analyzer
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    # Single gunicorn worker: SQLite has one writer, and one worker avoids
    # cross-process lock contention on the WAL file. Plenty for 5-10 users.
    # --max-requests recycles the worker every ~200 requests (jittered ±50 so a
    # restart storm can't sync up), returning all heap to the OS. Bounds the slow
    # time-driven memory creep that was walking a never-recycled worker into the
    # 512MB ceiling (~2 OOM/day). The jitter desyncs respawns; 200 is well above
    # normal per-window traffic so recycles are invisible to users.
    startCommand: gunicorn -w 1 --max-requests 200 --max-requests-jitter 50 -b 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/app.db
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong secret
      - key: ANTHROPIC_API_KEY
        sync: false                # set manually in the dashboard (used in Weekend 2)
